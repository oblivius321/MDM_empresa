###############################################
# Elion MDM – Nginx Reverse Proxy
# Routes:  / → frontend | /api → backend | /ws → backend websocket
###############################################

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # ── Security headers ─────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"              always;
    add_header X-Content-Type-Options     "nosniff"                 always;
    add_header X-XSS-Protection           "1; mode=block"           always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    # HSTS – habilitar quando TLS estiver ativo:
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Gzip ─────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ── Rate limiting zones ──────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m  rate=5r/m;
    limit_req_zone $binary_remote_addr zone=general:10m     rate=30r/s;

    # ── Upstreams ────────────────────────────
    upstream backend_upstream {
        server backend:8000;
    }

    upstream frontend_upstream {
        server frontend:3000;
    }

    # ══════════════════════════════════════════
    # HTTP server (development)
    # ══════════════════════════════════════════
    server {
        listen 80;
        server_name _;

        # ── /api → Backend FastAPI ───────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://backend_upstream;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
            proxy_buffering       off;
        }

        # ── /api/auth/* → stricter rate limit ─
        location /api/auth/ {
            limit_req zone=auth_limit burst=3 nodelay;

            proxy_pass         http://backend_upstream;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── /ws → WebSocket backend ──────────
        location /ws {
            proxy_pass         http://backend_upstream;
            proxy_http_version 1.1;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;

            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
        }

        # ── /api/ws/* → WebSocket backend ────
        location /api/ws/ {
            proxy_pass         http://backend_upstream;
            proxy_http_version 1.1;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
            proxy_buffering     off;
        }

        # ── /health  → quick nginx health ────
        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ── /api/health → backend health  ────
        location = /api/health {
            access_log off;
            proxy_pass http://backend_upstream/health;
            proxy_set_header Host $host;
        }

        # ── / → Frontend (catch-all) ─────────
        location / {
            limit_req zone=general burst=50 nodelay;

            proxy_pass         http://frontend_upstream;
            proxy_http_version 1.1;

            # HMR WebSocket support (Vite dev)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }
    }

    # ══════════════════════════════════════════
    # HTTPS server (production – uncomment when certs are ready)
    # ══════════════════════════════════════════
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    #
    #     # Same location blocks as HTTP above
    # }
    #
    # # HTTP → HTTPS redirect (production)
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$host$request_uri;
    # }
}
