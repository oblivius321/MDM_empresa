###############################################
# Elion MDM – Nginx Reverse Proxy
# Routes:  / → frontend | /api → backend | /ws → backend websocket
###############################################

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    # ── Security headers ─────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"              always;
    add_header X-Content-Type-Options     "nosniff"                 always;
    add_header X-XSS-Protection           "1; mode=block"           always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip ─────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ── Rate limiting zones ──────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m  rate=5r/m;
    limit_req_zone $binary_remote_addr zone=general:10m     rate=30r/s;

    server {
        listen 80;
        server_name _;

        location /static/ {
            set $backend_target http://backend:8000;
            proxy_pass         $backend_target;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
            proxy_buffering       off;
        }

        # ── /api → Backend FastAPI ───────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            set $backend_target http://backend:8000;
            proxy_pass         $backend_target;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
            proxy_buffering       off;
        }

        # ── /api/auth/* → stricter rate limit ─
        location /api/auth/ {
            limit_req zone=auth_limit burst=3 nodelay;

            set $backend_target http://backend:8000;
            proxy_pass         $backend_target;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── /ws → WebSocket backend ──────────
        location /ws {
            set $backend_target http://backend:8000;
            proxy_pass         $backend_target;
            proxy_http_version 1.1;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;

            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
        }

        # ── /api/ws/* → WebSocket backend ────
        location /api/ws/ {
            set $backend_target http://backend:8000;
            proxy_pass         $backend_target;
            proxy_http_version 1.1;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
            proxy_buffering     off;
        }

        # ── /health  → quick nginx health ────
        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ── /api/health → backend health  ────
        location = /api/health {
            access_log off;
            set $backend_target http://backend:8000/health;
            proxy_pass $backend_target;
            proxy_set_header Host $host;
        }

        # ── / → Frontend (catch-all) ─────────
        location / {
            set $frontend_target http://frontend:3000;
            proxy_pass         $frontend_target;
            proxy_http_version 1.1;
            proxy_hide_header  Cache-Control;
            add_header         Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
            add_header         Pragma "no-cache" always;
            add_header         Expires "0" always;

            # HMR WebSocket support (Vite dev)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }
    }
}
