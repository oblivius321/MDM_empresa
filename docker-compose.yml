###############################################
# Elion MDM – Docker Compose
# Dev:  docker compose up -d
# Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
###############################################

services:
  # ═══════ PostgreSQL 15 ═══════════════════
  postgres:
    image: postgres:15-alpine
    container_name: elion-mdm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Defina DB_PASSWORD no .env}
      POSTGRES_DB:       ${DB_NAME:-mdm_project}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - elion-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-mdm_project}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ═══════ Backend FastAPI ═════════════════
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: elion-mdm-backend
    restart: unless-stopped
    environment:
      DATABASE_URL:           postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-mdm_project}
      SECRET_KEY:             ${SECRET_KEY:?Defina SECRET_KEY no .env}
      BOOTSTRAP_SECRET:       ${BOOTSTRAP_SECRET:?Defina BOOTSTRAP_SECRET no .env}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:?Defina DEFAULT_ADMIN_PASSWORD no .env}
      DEBUG:                  ${DEBUG:-True}
      ENVIRONMENT:            ${ENVIRONMENT:-development}
      ALLOWED_ORIGINS:        ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost,http://localhost:5173}
    # Backend NÃO exposto ao host – Nginx faz proxy reverso
    # Em dev, descomente a linha abaixo para acesso direto:
    # ports:
    #   - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend:ro
    networks:
      - elion-network
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload --timeout-keep-alive 30 --limit-concurrency 100

  # ═══════ Frontend React/Vite ═════════════
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: elion-mdm-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - elion-network
    command: npm run dev -- --host 0.0.0.0 --port 3000

  # ═══════ Nginx Reverse Proxy ═════════════
  nginx:
    image: nginx:alpine
    container_name: elion-mdm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:80"
      # - "443:443"   # Habilitar quando TLS estiver pronto
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - elion-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  elion-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
