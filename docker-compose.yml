version: '3.9'

services:
  # ===== PostgreSQL Database =====
  postgres:
    image: postgres:15-alpine
    container_name: elion-mdm-postgres
    environment:
      # Lidos do .env raiz
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD?A senha do banco precisa ser configurada no .env}
      POSTGRES_DB: ${DB_NAME:-mdm_project}
    ports:
      # Porta 5432 mapeada para o Host (Permite seu pgAdmin local acessar via localhost:5432)
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - elion-network
    # IMPORTANTE: Healthcheck garante que o banco ligou antes do backend subir
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-mdm_project}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===== Backend FastAPI Server =====
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: elion-mdm-backend
    environment:
      # IMPORTANTE: Dentro da rede Docker, o backend enxerga o banco pelo nome do servico 'postgres'
      # NOTA: Usar DATABASE_URL_DOCKER que sobrepõe a DATABASE_URL para forçar conexão "postgres:5432"
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-mdm_project}
      SECRET_KEY: ${SECRET_KEY?Missing SECRET_KEY}
      DEBUG: ${DEBUG:-True}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    ports:
      # A porta 8000 mapeada para o seu SO testar a API no navegador
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy # Só sobe quando o Postgres diz que está pronto
    volumes:
      - ./backend:/app/backend:ro
    networks:
      - elion-network
    command: >
      sh -c "python migrate_sqlite_to_postgres.py &&
             uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"

  # ===== Frontend Vite + Node =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: elion-mdm-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - elion-network
    command: npm run dev -- --host 0.0.0.0 --port 3000

  # ===== Nginx Reverse Proxy (Opcional - útil na Fase de Produção) =====
  nginx:
    image: nginx:alpine
    container_name: elion-mdm-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - elion-network

networks:
  elion-network:
    driver: bridge

volumes:
  # Volume para reter os dados do banco mesmo que os containers sejam destruídos
  postgres_data:
    driver: local
