###############################################
# Elion MDM – Docker Compose
# Dev:  docker compose up -d
# Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
###############################################

services:
  # ═══════ PostgreSQL 15 ═══════════════════
  postgres:
    image: postgres:15-alpine
    container_name: elion-mdm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Defina DB_PASSWORD no .env}
      POSTGRES_DB: ${DB_NAME:-mdm_project}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - elion-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-mdm_project}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════ Redis ═══════════════════════════
  redis:
    image: redis:7-alpine
    container_name: elion-mdm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - elion-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ═══════ Backend FastAPI ═════════════════
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: elion-mdm-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-mdm_project}
      SECRET_KEY: ${SECRET_KEY:?Defina SECRET_KEY no .env}
      BOOTSTRAP_SECRET: ${BOOTSTRAP_SECRET:?Defina BOOTSTRAP_SECRET no .env}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:?Defina DEFAULT_ADMIN_PASSWORD no .env}
      DEBUG: ${DEBUG:-True}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://192.168.25.227:3000,http://192.168.25.227,http://192.168.25.227:5173}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_URL: ${API_URL}
      ANDROID_MANAGEMENT_PROJECT_ID: ${ANDROID_MANAGEMENT_PROJECT_ID:-}
      ANDROID_MANAGEMENT_SERVICE_ACCOUNT_FILE: ${ANDROID_MANAGEMENT_SERVICE_ACCOUNT_FILE:-}
      ANDROID_MANAGEMENT_KIOSK_PACKAGE: ${ANDROID_MANAGEMENT_KIOSK_PACKAGE:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./secrets:/app/secrets:ro
    networks:
      - elion-network
    # Expondo 8200 para evitar conflitos (7924-8023 e 8081-8180 estão ocupados no host)
    ports:
      - "8200:8000"
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3

  # ═══════ Frontend React/Vite ═════════════
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: elion-mdm-frontend
    restart: unless-stopped
    environment:
      VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS:-}
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - elion-network
    # Expondo 3000 para debug direto se necessário
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ═══════ Nginx Reverse Proxy ═════════════
  nginx:
    image: nginx:alpine
    container_name: elion-mdm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - elion-network
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1/health" ]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  elion-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
