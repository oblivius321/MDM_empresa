services:
  backend:
    # Sem --reload, sem volume mount
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 4
    volumes:
      - ./secrets:/app/secrets:ro
    restart: unless-stopped

  frontend:
    # Build de producao com servidor HTTP simples para o bundle estatico
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    command: []
    volumes: []
    restart: unless-stopped
    environment:
      VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS:-}

  postgres:
    # Nao expoe a porta 5432 ao host em producao
    ports: []
