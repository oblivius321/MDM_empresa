on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  id-token: write # Requerido para assinatura keyless (Cosign)
  packages: write # Requerido para o GHCR
  contents: read
  security-events: write

jobs:
  # 1. SEGURANÇA: Verificação de Segredos (Gitleaks + Trufflehog)
  secrets-scan:
    name: "Secrets & Leaks Detection"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: TruffleHog Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # 2. BACKEND: Python Security & Quality
  backend-gate:
    name: "Backend: SAST & SCA"
    runs-on: ubuntu-latest
    needs: [secrets-scan]
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install ruff mypy pytest bandit pip-audit -r requirements.txt

      - name: Lint (Ruff)
        run: ruff check .

      - name: Type Check (Mypy)
        run: mypy .

      - name: Security Scan (Bandit)
        run: bandit -r . -ll

      - name: Dependency Scan (Pip-Audit - FAIL FAST)
        run: pip-audit --strict

      - name: Run Tests (Pytest)
        run: pytest

  # 3. ANDROID: Kotlin Security & Build
  android-gate:
    name: "Android: SAST & Build"
    runs-on: ubuntu-latest
    needs: [secrets-scan]
    defaults:
      run:
        working-directory: ./android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Detekt (Kotlin SAST)
        run: ./gradlew detekt

      - name: Gradle Build (Release)
        run: ./gradlew assembleRelease

  # 4. CONTAINERS: Image Scan (Trivy)
  container-gate:
    name: "Containers: Vulnerability Scan"
    runs-on: ubuntu-latest
    needs: [backend-gate]
    steps:
      - uses: actions/checkout@v4

      - name: Install Secure Tools (Syft & Cosign)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/sigstore/cosign/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Build temporary image
        run: docker build -t elion-mdm-backend:${{ github.sha }} ./backend -f Dockerfile.backend

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'elion-mdm-backend:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Generate SBOM (Syft)
        run: syft elion-mdm-backend:${{ github.sha }} -o spdx-json=sbom.spdx.json

      - name: Sign and Attest Artifacts (Cosign - Keyless)
        run: |
          # Nota: Em ambiente CI real, usaríamos o digest da imagem pushada para o GHCR
          # Aqui simulamos a atestação do SBOM gerado
          cosign attest --yes --predicate sbom.spdx.json --type spdx elion-mdm-backend:${{ github.sha }}
        continue-on-error: true # Permitir bypass em ambiente de teste local se OIDC falhar

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
